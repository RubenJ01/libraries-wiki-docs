name: Sync wikis and publish Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"
  repository_dispatch:
    types: [wikis_updated]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync public wikis
        run: python scripts/sync_wikis.py

      - name: Commit and push if wikis changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/projects mkdocs.yml docs/index.md
          if git diff --staged --quiet; then
            echo "No wiki changes to commit."
          else
            LIST=$(git diff --cached --name-only | grep '^docs/projects/' | cut -d/ -f3 | sort -u | grep . || true)
            N=$(echo "$LIST" | grep -c '^' || true)
            HOME=0
            git diff --cached --name-only | grep -q '^docs/index.md$' && HOME=1 || true
            if [ -n "$LIST" ]; then
              if [ "$N" -eq 1 ]; then
                MSG="docs: sync wiki ${LIST}"
              else
                REPOS=$(echo "$LIST" | paste -sd, - | sed 's/,/, /g')
                MSG="docs: sync wikis ${REPOS}"
              fi
              [ "$HOME" -eq 1 ] && MSG="${MSG} + home"
            elif [ "$HOME" -eq 1 ]; then
              MSG="docs: update home"
            else
              MSG="docs: sync GitHub wikis"
            fi
            git commit -m "$MSG"
            git push
          fi

      - name: Build MkDocs
        run: mkdocs build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
