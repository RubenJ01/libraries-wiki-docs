name: Sync wikis and publish Pages

on:
  push:
    branches: [main]
  schedule:
    # Daily wiki sync (UTC)
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    # Skip duplicate run when the scheduled job pushes a [skip ci] sync commit
    if: |
      github.event_name != 'push' ||
      github.event.head_commit == null ||
      !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ github.event_name != 'schedule' || steps.commit.outputs.sync_committed == 'true' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync public wikis
        run: python scripts/sync_wikis.py

      - name: Commit and push if wikis changed
        id: commit
        run: |
          echo "sync_committed=false" >> "$GITHUB_OUTPUT"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/projects mkdocs.yml docs/index.md
          if git diff --staged --quiet; then
            echo "No wiki changes to commit."
          else
            LIST=$(git diff --cached --name-only | grep '^docs/projects/' | cut -d/ -f3 | sort -u | grep . || true)
            N=$(echo "$LIST" | grep -c '^' || true)
            HOME=0
            git diff --cached --name-only | grep -q '^docs/index.md$' && HOME=1 || true
            if [ -n "$LIST" ]; then
              if [ "$N" -eq 1 ]; then
                MSG="docs: sync wiki ${LIST}"
              else
                REPOS=$(echo "$LIST" | paste -sd, - | sed 's/,/, /g')
                MSG="docs: sync wikis ${REPOS}"
              fi
              [ "$HOME" -eq 1 ] && MSG="${MSG} + home"
            elif [ "$HOME" -eq 1 ]; then
              MSG="docs: update home"
            else
              MSG="docs: sync GitHub wikis"
            fi
            git commit -m "${MSG} [skip ci]"
            git push
            echo "sync_committed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build MkDocs
        if: github.event_name != 'schedule' || steps.commit.outputs.sync_committed == 'true'
        run: mkdocs build

      - uses: actions/upload-pages-artifact@v3
        if: github.event_name != 'schedule' || steps.commit.outputs.sync_committed == 'true'
        with:
          path: site

  deploy:
    needs: build
    if: needs.build.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
